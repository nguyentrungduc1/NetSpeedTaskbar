name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: Checkout source
      uses: actions/checkout@v4

    - name: Download AutoHotkey v2 (GitHub release)
      shell: powershell
      run: |
        Invoke-WebRequest `
          -Uri "https://github.com/AutoHotkey/AutoHotkey/releases/latest/download/AutoHotkey.zip" `
          -OutFile "ahk.zip"

        Expand-Archive "ahk.zip" -DestinationPath "ahk"

    - name: Compile EXE
      shell: powershell
      run: |
        $ahkCompiler = "ahk\Compiler\Ahk2Exe.exe"
        $inputFile = "NetSpeedTaskbar.ahk"
        $outputFile = "NetSpeedTaskbar.exe"

        & $ahkCompiler /in $inputFile /out $outputFile

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: NetSpeedTaskbar
        path: NetSpeedTaskbar.exe
