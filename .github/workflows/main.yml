name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: Checkout source
      uses: actions/checkout@v4

    - name: Download AutoHotkey v2
      shell: powershell
      run: |
        Invoke-WebRequest `
          -Uri "https://www.autohotkey.com/download/ahk-v2.zip" `
          -OutFile "ahk.zip"

        Expand-Archive "ahk.zip" -DestinationPath "ahk"

    - name: Compile EXE
      shell: powershell
      run: |
        $ahk = "ahk\Compiler\Ahk2Exe.exe"
        $input = "NetSpeedTaskbar.ahk"
        $output = "NetSpeedTaskbar.exe"

        & $ahk /in $input /out $output

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: NetSpeedTaskbar
        path: NetSpeedTaskbar.exe
